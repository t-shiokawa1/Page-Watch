<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f1ea" />
    <meta name="description" content="ローカルPCで動く、自分専用のWebサイト更新監視ツール" />
    <title>PageWatch — サイト更新モニター</title>
  </head>
  <body>
    <div id="root">
      <main class="file-launcher">
        <p class="file-kicker">PAGEWATCH / LOCAL APP</p>
        <h1>この画面は、<br />起動後に表示されます。</h1>
        <p>
          PageWatchは監視データをPC内へ保存するため、HTMLファイル単体では動作しません。
          このウィンドウを閉じ、同じフォルダの <strong>start.command</strong> をダブルクリックしてください。
        </p>
        <a href="http://127.0.0.1:8765">すでに起動している場合はこちら →</a>
      </main>
      <style>
        .file-launcher {
          box-sizing: border-box;
          min-height: 100vh;
          padding: clamp(48px, 10vw, 120px);
          display: flex;
          flex-direction: column;
          justify-content: center;
          color: #181a18;
          background: #f4f1ea;
          font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", system-ui, sans-serif;
        }
        .file-kicker { margin: 0 0 24px; font: 600 11px ui-monospace, monospace; letter-spacing: .14em; color: #ff6b3d; }
        .file-launcher h1 { max-width: 820px; margin: 0; font-size: clamp(48px, 8vw, 100px); line-height: .95; letter-spacing: -.07em; font-weight: 600; }
        .file-launcher > p:not(.file-kicker) { max-width: 680px; margin: 38px 0 28px; font-size: 15px; line-height: 2; color: #5d605c; }
        .file-launcher a { width: fit-content; padding: 15px 19px; color: #fff; background: #181a18; text-decoration: none; font-weight: 600; }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
